<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select YouTube Videos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <style>
    /* Fixed window styling */
    body {
      width: 400px;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }
    h3 {
      text-align: center;
      color: red;
      font-family: futura;
      font-size: 18px;
      font-weight: bold;
      
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    /* Range input styles */
    .range-input {
      display: flex;
      align-items: center;
      margin-top: 5px;
    }
    .range-input input {
      width: 45%;
      padding: 5px;
      margin-right: 10px;
    }
    .delete-range {
      background-color: #f44336;
      color: white;
      border: none;
      padding: 5px;
      cursor: pointer;
      border-radius: 50%;
      font-size: 12px;
      font-weight: bold;
      width: 25px;
      height: 25px;
      text-align: center;
      line-height: 15px;
      margin-left: 10px;
      margin-top: 5px;
    }
    .delete-range:hover {
      background-color: #d32f2f;
    }
    /* Video list container */
    #video-list {
      max-height: 250px; /* Adjust as needed */
      overflow-y: auto;
      margin-top: 10px;
      padding-right: 10px;
    }
    
    #video-list > * {
      display: block;
      margin: 5px 0;
    }

    #video-list label {
      display: block;
      padding: 5px;
      background: #f5f5f5;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <h3>Youtube URL Scraper</h3>

  <!-- Select All / Unselect All Buttons -->
  <button id="select-all">Select All</button>
  <button id="unselect-all">Unselect All</button>

  <!-- Multiple Range Selection -->
  <div id="range-container">
    <div class="range-input">
      <input type="number" class="range-start" min="1" placeholder="Start" value="1" />
      <input type="number" class="range-end" min="1" placeholder="End" />
      <button class="delete-range">X</button>
    </div>
  </div>
  <button id="add-range">+ Add Range</button>
  <button id="select-ranges">Select Ranges</button>

  <!-- Video List -->
  <div id="video-list">
  </div>

  <!-- Download Button -->
  <button id="download">Download Selected URLs</button>
  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
